# Render.com blueprint — free single-service deploy.
# Storage is Turso (remote), so the free tier's ephemeral disk is fine.
services:
  - type: web
    name: work-log
    runtime: node
    plan: free
    # --include=dev forces devDependencies (Vite) to install even though
    # NODE_ENV=production would otherwise skip them, which breaks the build.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Set these in the Render dashboard (sync:false keeps them out of git):
      - key: DATABASE_URL # turso db show work-log --url
        sync: false
      - key: DATABASE_AUTH_TOKEN # turso db tokens create work-log
        sync: false
      - key: APP_PASSWORD # the shared login password
        sync: false
      - key: SESSION_SECRET # long random string; keeps logins across restarts
        generateValue: true
      # Monthly employer report email (sent by an external cron hitting
      # POST /api/cron/monthly-employer-report on the 1st of each month):
      - key: RESEND_API_KEY # from resend.com
        sync: false
      - key: REPORT_EMAIL_FROM # e.g. onboarding@resend.dev, or a verified domain address
        sync: false
      - key: REPORT_EMAIL_TO # recipient for the monthly report
        sync: false
      - key: CRON_SECRET # shared secret the external cron sends as the x-cron-secret header
        sync: false
