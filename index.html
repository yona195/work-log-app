<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>יומן עבודה</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body class="loading">
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-box">
      <img
        src="logo.png"
        alt="לוגו החברה"
        class="loading-logo"
      />

      <h2>יומן עבודה</h2>

      <p id="loadingText">
        טוען נתונים מהענן...
      </p>

      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>

      <p class="loading-note">
        אנא המתן מספר שניות
      </p>
    </div>
  </div>

  <button
    id="menuToggle"
    class="menu-toggle"
    type="button"
    aria-label="פתיחת תפריט"
    aria-expanded="false"
  >
    ☰
  </button>

  <div id="menuOverlay" class="menu-overlay"></div>

  <div class="app">

    <aside class="sidebar">
      <h2>יומן עבודה</h2>

      <button class="nav-btn active" data-page="dashboard">
        סקירה כללית
      </button>

      <button class="nav-btn" data-page="worklog">
        יומן עבודה
      </button>

      <button class="nav-btn" data-page="reports">
        דוחות PDF / Excel
      </button>

      <button class="nav-btn" data-page="employees">
        עובדים וקבלני משנה
      </button>

      <button class="nav-btn" data-page="sites">
        אתרי עבודה
      </button>

      <button class="nav-btn" data-page="buildings">
        מבנים
      </button>

      <button class="nav-btn" data-page="customers">
        מזמיני עבודה
      </button>
    </aside>

    <main class="main">

      <header class="topbar">
        <h1 id="pageTitle">יומן עבודה</h1>

        <p>מערכת מקומית לניהול יומן עבודה</p>

        <div id="syncStatus" class="sync-status">
          🔄 טוען נתונים מהענן...
        </div>

        <button
          class="primary-btn"
          type="button"
          onclick="saveToCloud()"
        >
          💾 שמור לענן
        </button>
      </header>

      <section id="content"></section>
    </main>

  </div>

  <!-- ספריית PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <!-- ספריית Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- קבצי המערכת -->
  <script src="data.js"></script>
  <script src="pdf.js"></script>
  <script src="app.js"></script>
</body>
</html>
