<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta name="theme-color" content="#1f2937" />

  <title>יומן עבודה</title>

  <!-- אייקונים של Google -->
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
  />

  <link rel="stylesheet" href="style.css?v=6" />
</head>

<body class="loading">

  <!-- מסך טעינה -->
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-box">

      <img
        src="logo.png?v=4"
        alt="לוגו החברה"
        class="loading-logo"
      />

      <h2>יומן עבודה</h2>

      <p id="loadingText">
        טוען נתונים מהענן...
      </p>

      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>

      <p class="loading-note">
        אנא המתן מספר שניות
      </p>

    </div>
  </div>

  <!-- כפתור תפריט במובייל -->
  <button
    id="menuToggle"
    class="menu-toggle"
    type="button"
    aria-label="פתיחת תפריט"
    aria-expanded="false"
  >
    ☰
  </button>

  <div
    id="menuOverlay"
    class="menu-overlay"
  ></div>

  <div class="app">

    <!-- תפריט צד -->
    <aside class="sidebar">

      <div class="sidebar-logo">
        יומן עבודה
      </div>

      <div class="sidebar-section">

        <div class="sidebar-section-title">
          עבודה יומית
        </div>

        <button
          class="nav-btn active"
          data-page="dashboard"
          type="button"
        >
          <span class="material-symbols-rounded nav-icon">
            dashboard
          </span>

          <span>
            סקירה כללית
          </span>
        </button>

        <button
          class="nav-btn"
          data-page="worklog"
          type="button"
        >
          <span class="material-symbols-rounded nav-icon">
            event_note
          </span>

          <span>
            יומן עבודה
          </span>
        </button>

        <button
          class="nav-btn"
          data-page="reports"
          type="button"
        >
          <span class="material-symbols-rounded nav-icon">
            description
          </span>

          <span>
            דוחות
          </span>
        </button>

      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">

        <div class="sidebar-section-title">
          הגדרות
        </div>

        <button
          class="nav-btn"
          data-page="employees"
          type="button"
        >
          <span class="material-symbols-rounded nav-icon">
            groups
          </span>

          <span>
            עובדים
          </span>
        </button>

        <button
          class="nav-btn"
          data-page="sites"
          type="button"
        >
          <span class="material-symbols-rounded nav-icon">
            location_city
          </span>

          <span>
            אתרי עבודה
          </span>
        </button>

        <button
          class="nav-btn"
          data-page="buildings"
          type="button"
        >
          <span class="material-symbols-rounded nav-icon">
            apartment
          </span>

          <span>
            מבנים
          </span>
        </button>

        <button
          class="nav-btn"
          data-page="customers"
          type="button"
        >
          <span class="material-symbols-rounded nav-icon">
            person
          </span>

          <span>
            מזמיני עבודה
          </span>
        </button>

        <button
          class="nav-btn"
          data-page="rates"
          type="button"
        >
          <span class="material-symbols-rounded nav-icon">
            payments
          </span>

          <span>
            תעריפים
          </span>
        </button>

      </div>

    </aside>

    <!-- תוכן ראשי -->
    <main class="main">

      <header class="topbar">

        <h1 id="pageTitle">
          סקירה כללית
        </h1>

        <p>
          מערכת מקומית לניהול יומן עבודה
        </p>

        <div class="sync-actions">

          <div
            id="syncStatus"
            class="sync-status"
          >
            🔄 טוען נתונים מהענן...
          </div>

          <button
            class="primary-btn"
            type="button"
            onclick="saveToCloud()"
          >
            💾 שמור
          </button>

        </div>

      </header>

      <section id="content"></section>

    </main>

  </div>

  <!-- ספריות PDF -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
  ></script>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"
  ></script>

  <!-- ספריות Excel -->
  <script
    src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"
  ></script>

  <script
    src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"
  ></script>

  <!-- ספריית גרפים -->
  <script
    src="https://cdn.jsdelivr.net/npm/chart.js"
  ></script>

  <!-- קבצי המערכת -->
  <script src="data.js?v=6"></script>
  <script src="pdf.js?v=6"></script>
  <script src="app.js?v=6"></script>

</body>
</html>
